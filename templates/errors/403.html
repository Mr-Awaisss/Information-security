{% extends 'base.html' %}

{% block title %}403 Access Denied — SecureAuth{% endblock %}

{% block content %}
<div class="error-page d-flex flex-column align-items-center justify-content-center text-center animate-fadeIn">
    <div class="error-icon-wrapper mb-4">
        <i class="bi bi-shield-lock-fill error-icon text-accent-yellow"></i>
    </div>
    <h1 class="error-code text-gradient-warning mb-0">403</h1>
    <h2 class="error-title text-white mt-2 mb-3">Access Forbidden</h2>
    <p class="error-message text-muted-custom mb-4 max-w-500">
        Access Denied. You do not possess the required security permissions or authorization tokens to view this sector of the platform.
    </p>
    <a href="{% if current_user.is_authenticated %}{{ url_for('dashboard.dashboard') }}{% else %}{{ url_for('auth.login') }}{% endif %}" class="btn btn-gradient btn-lg">
        <i class="bi bi-house-door-fill me-2"></i> Return to Safety
    </a>
</div>
{% endblock %}
